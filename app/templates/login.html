{% extends "base.html" %}

{% block title %}Вход - LocalTube{% endblock %}
{% block main_class %}login-page{% endblock %}

{% block content %}
  <section class="login-panel">
    <h1>Вход</h1>
    {% if error %}
      <p class="alert">{{ error }}</p>
    {% endif %}
    <form action="/login" method="post" class="form-stack">
      <label>
        Логин
        <input type="text" name="username" autocomplete="username" required autofocus>
      </label>
      <label>
        Пароль
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button type="submit" class="button primary">Войти</button>
    </form>
    <p class="muted">Первый администратор: <strong>admin</strong> / <strong>admin</strong></p>
  </section>
{% endblock %}
