{% extends "base.html" %}

{% block title %}Вхід - LocalTube{% endblock %}
{% block main_class %}login-page{% endblock %}

{% block content %}
  <section class="login-panel">
    <h1>Вхід</h1>
    {% if error %}
      <p class="alert">{{ error }}</p>
    {% endif %}
    <form action="/login" method="post" class="form-stack">
      <label>
        Логін
        <input type="text" name="username" autocomplete="username" required autofocus>
      </label>
      <label>
        Пароль
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button type="submit" class="button primary">Увійти</button>
    </form>
    <p class="muted auth-switch">Немає акаунта? <a href="/register">Зареєструватися</a></p>
  </section>
{% endblock %}
