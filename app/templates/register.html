{% extends "base.html" %}

{% block title %}Регистрация - LocalTube{% endblock %}
{% block main_class %}login-page{% endblock %}

{% block content %}
  <section class="login-panel">
    <h1>Регистрация</h1>
    {% if error %}
      <p class="alert">{{ error }}</p>
    {% endif %}
    <form action="/register" method="post" class="form-stack">
      <label>
        Логин
        <input type="text" name="username" autocomplete="username" required autofocus>
      </label>
      <label>
        Пароль
        <input type="password" name="password" autocomplete="new-password" required>
      </label>
      <button type="submit" class="button primary">Создать аккаунт</button>
    </form>
    <p class="muted auth-switch">Уже есть аккаунт? <a href="/login">Войти</a></p>
  </section>
{% endblock %}
