<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Локальный видеосайт{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/main.css') }}?v=31">
  </head>
  <body>
    <header class="topbar">
      <div class="brand-group">
        <button type="button" class="menu-icon-button" data-sidebar-toggle aria-label="Скрыть меню" title="Скрыть меню">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <a class="brand" href="/">LocalTube</a>
      </div>
      <nav class="topnav" aria-label="Основная навигация">
        <a href="/">Видео</a>
        {% if user and user.is_admin %}
          <a href="/admin">Админ-панель</a>
        {% endif %}
      </nav>
      <div class="userbar">
        <button type="button" class="theme-switch" data-theme-toggle aria-label="Переключить тему" title="Переключить тему" aria-pressed="false">
          <span class="theme-switch-icon sun-icon" aria-hidden="true"></span>
          <span class="theme-switch-thumb" aria-hidden="true"></span>
          <span class="theme-switch-icon moon-icon" aria-hidden="true"></span>
        </button>
        {% if user %}
          <a class="button" href="/?upload=1">Загрузить</a>
          <span>{{ user.username }}</span>
          <form action="/logout" method="post">
            <button type="submit" class="button ghost">Выйти</button>
          </form>
        {% else %}
          <a class="login-icon" href="/?login=1" aria-label="Войти" title="Войти">
            <span class="visually-hidden">Войти</span>
          </a>
        {% endif %}
      </div>
    </header>
    <main class="{% block main_class %}page{% endblock %}">
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', path='/js/app.js') }}?v=31"></script>
  </body>
</html>
